<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>フラッシュ・トレーニング・プロ</title>
    <link rel="icon" href="data:,">
    <style>
        body { font-family: 'Helvetica Neue', Arial, sans-serif; text-align: center; background: #f4f7f6; color: #333; margin: 0; padding: 20px; }
        #game-container { background: white; max-width: 500px; margin: 0 auto; padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); min-height: 450px; }
        .mode-btn { display: block; width: 100%; max-width: 250px; margin: 10px auto; padding: 15px; background: #3498db; color: white; border: none; border-radius: 8px; font-size: 18px; font-weight: bold; cursor: pointer; }
        #flash-text { font-size: 100px; font-weight: bold; height: 150px; display: flex; align-items: center; justify-content: center; margin: 20px 0; }
        .choice-btn { font-size: 22px; width: 60px; height: 60px; margin: 5px; cursor: pointer; border: 2px solid #3498db; background: white; border-radius: 10px; }
        .choice-btn:active { background: #3498db; color: white; }
        
        /* タイマーバーのスタイル */
        #timer-container { width: 100%; height: 8px; background: #eee; border-radius: 4px; margin: 20px 0; display: none; overflow: hidden; }
        #timer-bar { width: 100%; height: 100%; background: #e74c3c; }
        
        #answer-progress { font-size: 18px; margin-bottom: 10px; color: #2980b9; height: 25px; }
    </style>
</head>
<body>

<div id="game-container">
    <div id="menu-screen">
        <h1>フラッシュ・プロ</h1>
        <button class="mode-btn" onclick="startGame('anzan')">フラッシュ暗算</button>
        <button class="mode-btn" onclick="startGame('memory')" style="background:#9b59b6;">フラッシュ記憶</button>
        <p>High Score: <span id="hi-score">0</span></p>
    </div>

    <div id="game-screen" style="display:none;">
        <div style="display: flex; justify-content: space-between; font-weight: bold;">
            <span>Lv: <span id="lv-display">1</span></span>
            <span>Score: <span id="score-display">0</span></span>
        </div>
        
        <div id="flash-text"></div>
        
        <div id="input-area" style="display:none;">
            <div id="answer-progress"></div>
            <div id="timer-container"><div id="timer-bar"></div></div>
            <div id="choices-container"></div>
            <div id="anzan-input-wrap" style="display:none; margin-top:10px;">
                <input type="number" id="anzan-field" style="font-size:24px; width:120px; padding:5px;">
                <button class="mode-btn" onclick="submitAnzan()" style="margin-top:10px;">決定</button>
            </div>
        </div>
    </div>
</div>

<script>
let gameType = '', level = 1, score = 0, numbers = [], answerIndex = 0;
let timerInterval, timeLeft;
const TIME_LIMIT = 5000; // 5秒制限

// ハイスコア読み込み
document.getElementById('hi-score').innerText = localStorage.getItem('flash_hi') || 0;

async function startGame(type) {
    gameType = type;
    document.getElementById('menu-screen').style.display = 'none';
    document.getElementById('game-screen').style.display = 'block';
    await runRound();
}

async function runRound() {
    numbers = [];
    answerIndex = 0;
    const count = 3 + Math.floor(level / 3);
    const speed = Math.max(200, 1000 - (level * 50));
    
    // 問題生成
    for(let i=0; i<count; i++) numbers.push(Math.floor(Math.random() * 9) + 1);

    // 数値表示フェーズ
    const display = document.getElementById('flash-text');
    document.getElementById('input-area').style.display = 'none';
    
    for(let n of numbers) {
        display.innerText = n;
        await new Promise(r => setTimeout(r, speed));
        display.innerText = '';
        await new Promise(r => setTimeout(r, 100));
    }

    startInuptPhase();
}

function startInuptPhase() {
    document.getElementById('input-area').style.display = 'block';
    document.getElementById('timer-container').style.display = 'block';
    const container = document.getElementById('choices-container');
    container.innerHTML = '';
    
    if(gameType === 'anzan') {
        document.getElementById('anzan-input-wrap').style.display = 'block';
        document.getElementById('answer-progress').innerText = "合計は？";
        document.getElementById('anzan-field').value = '';
        document.getElementById('anzan-field').focus();
    } else {
        document.getElementById('anzan-input-wrap').style.display = 'none';
        updateMemoryProgress();
        // 1-9のテンキー作成
        for(let i=1; i<=9; i++) {
            const btn = document.createElement('button');
            btn.className = 'choice-btn';
            btn.innerText = i;
            btn.onclick = () => handleMemoryInput(i);
            container.appendChild(btn);
        }
    }
    
    startTimer();
}

function startTimer() {
    clearInterval(timerInterval);
    timeLeft = 100;
    const bar = document.getElementById('timer-bar');
    
    timerInterval = setInterval(() => {
        timeLeft -= 1; // 100msごとに1%減少（計10秒制限に調整）
        bar.style.width = timeLeft + "%";
        
        if(timeLeft <= 0) {
            clearInterval(timerInterval);
            gameOver("時間切れ！");
        }
    }, 100); // 制限時間は約10秒（レベルに合わせて短くすることも可能）
}

function handleMemoryInput(val) {
    if(val === numbers[answerIndex]) {
        answerIndex++;
        updateMemoryProgress();
        if(answerIndex === numbers.length) {
            success();
        }
    } else {
        gameOver("不正解！");
    }
}

function submitAnzan() {
    const val = parseInt(document.getElementById('anzan-field').value);
    const sum = numbers.reduce((a,b) => a+b, 0);
    if(val === sum) success(); else gameOver("不正解！");
}

function updateMemoryProgress() {
    document.getElementById('answer-progress').innerText = `入力中: ${answerIndex} / ${numbers.length}`;
}

function success() {
    clearInterval(timerInterval);
    score += level * 100;
    level++;
    document.getElementById('score-display').innerText = score;
    document.getElementById('lv-display').innerText = level;
    
    // ハイスコア更新
    if(score > (localStorage.getItem('flash_hi') || 0)) {
        localStorage.setItem('flash_hi', score);
    }
    
    setTimeout(runRound, 500);
}

function gameOver(msg) {
    clearInterval(timerInterval);
    alert(msg + "\nScore: " + score);
    location.reload();
}
</script>
</body>
</html>
