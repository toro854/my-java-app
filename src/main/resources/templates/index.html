<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>フラッシュ・トレーニング・プロ 完全版</title>
    <link rel="icon" href="data:,">
    <style>
        body { font-family: 'Helvetica Neue', Arial, sans-serif; text-align: center; background: #f4f7f6; color: #333; margin: 0; padding: 20px; }
        #game-container { background: white; max-width: 600px; margin: 0 auto; padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); min-height: 500px; position: relative; }
        .mode-btn { display: block; width: 100%; max-width: 280px; margin: 12px auto; padding: 15px; background: #3498db; color: white; border: none; border-radius: 8px; font-size: 18px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .mode-btn:hover { background: #2980b9; transform: translateY(-2px); }
        .back-btn { background: #95a5a6; }
        #flash-text { font-size: 100px; font-weight: bold; height: 180px; display: flex; align-items: center; justify-content: center; margin: 20px 0; }
        .flip { transform: scaleX(-1); }
        .choice-btn { font-size: 22px; padding: 15px; width: 45%; margin: 5px; cursor: pointer; border: 2px solid #3498db; background: white; border-radius: 10px; transition: 0.2s; }
        .choice-btn:hover { background: #3498db; color: white; }
        #timer-container { width: 100%; height: 10px; background: #eee; border-radius: 5px; margin: 20px 0; overflow: hidden; display: none; }
        #timer-bar { width: 100%; height: 100%; background: #e74c3c; }
        #answer-progress { font-size: 20px; color: #2980b9; font-weight: bold; margin-bottom: 10px; }
    </style>
</head>
<body>

<div id="game-container">
    <div id="menu-screen">
        <div id="step-0">
            <h1>フラッシュ・プロ</h1>
            <button class="mode-btn" onclick="setStep('step-0','step-1'); selectedType='anzan';">フラッシュ暗算</button>
            <button class="mode-btn" onclick="setStep('step-0','step-1'); selectedType='memory';" style="background:#9b59b6;">フラッシュ記憶</button>
            <p>High Score: <span id="hi-score">0</span></p>
        </div>

        <div id="step-1" style="display:none;">
            <h2 id="current-game-title">モード選択</h2>
            <button class="mode-btn" onclick="mainMode='normal'; setStep('step-1','step-normal-1')">通常モード</button>
            <button class="mode-btn" onclick="mainMode='challenge'; setStep('step-1','step-challenge')" style="background:#e67e22;">チャレンジモード</button>
            <button class="mode-btn back-btn" onclick="setStep('step-1','step-0')">← 戻る</button>
        </div>

        <div id="step-normal-1" style="display:none;">
            <h3>文字種を選択</h3>
            <button class="mode-btn" onclick="subMode='num'; setStep('step-normal-1','step-normal-level')">数字のみ</button>
            <button class="mode-btn" onclick="subMode='kanji'; setStep('step-normal-1','step-normal-level')">漢数字</button>
            <button class="mode-btn" onclick="subMode='roman'; setStep('step-normal-1','step-normal-level')">旧漢数字</button>
            <button class="mode-btn" onclick="subMode='mix'; setStep('step-normal-1','step-normal-level')">複合</button>
        </div>
        <div id="step-normal-level" style="display:none;">
            <h3>開始レベル</h3>
            <button class="mode-btn" onclick="level=1; setStep('step-normal-level','step-normal-2')">Lv.1</button>
            <button class="mode-btn" onclick="level=10; setStep('step-normal-level','step-normal-2')">Lv.10</button>
            <button class="mode-btn back-btn" onclick="setStep('step-normal-level','step-normal-1')">戻る</button>
        </div>
        <div id="step-normal-2" style="display:none;">
            <h3>ギミック</h3>
            <button class="mode-btn" onclick="isFlip=true; startInit()">反転あり</button>
            <button class="mode-btn" onclick="isFlip=false; startInit()">なし</button>
        </div>

        <div id="step-challenge" style="display:none;">
            <h3>チャレンジレベル</h3>
            <button class="mode-btn" onclick="challengeLevel=1; startInit()">Lv.1 (数字のみ/途中反転)</button>
            <button class="mode-btn" onclick="challengeLevel=2; startInit()">Lv.2 (全文字種/反転なし)</button>
            <button class="mode-btn" onclick="challengeLevel=3; startInit()">Lv.3 (全文字種/反転あり)</button>
            <button class="mode-btn back-btn" onclick="setStep('step-challenge','step-1')">戻る</button>
        </div>
    </div>

    <div id="game-screen" style="display:none;">
        <div style="display: flex; justify-content: space-between; font-weight: bold;">
            <span>Level: <span id="lv-ui">1</span></span>
            <span style="color:#27ae60;">Score: <span id="sc-ui">0</span></span>
        </div>
        <div id="flash-text"></div>
        <div id="input-area" style="display:none;">
            <div id="answer-progress"></div>
            <div id="timer-container"><div id="timer-bar"></div></div>
            <div id="choices-container"></div>
        </div>
        <button onclick="location.reload()" style="margin-top:20px; font-size:12px; color:red; border:none; background:none; cursor:pointer;">リタイア</button>
    </div>
</div>

<script>
let selectedType='', mainMode='', subMode='num', level=1, challengeLevel=0, score=0, isFlip=false;
let numbers=[], answerIndex=0, timerInterval, timeLeft;
const KANJI = ["〇", "一", "二", "三", "四", "五", "六", "七", "八", "九"];
const ROMAN = ["零", "壱", "弐", "参", "肆", "伍", "陸", "漆", "捌", "玖"];

function setStep(old, next) {
    document.getElementById(old).style.display = 'none';
    document.getElementById(next).style.display = 'block';
}

function startInit() {
    document.getElementById('menu-screen').style.display = 'none';
    document.getElementById('game-screen').style.display = 'block';
    score = 0;
    if(mainMode === 'challenge') level = 1;
    runRound();
}

async function runRound() {
    numbers = []; answerIndex = 0;
    // チャレンジモード固有のルール
    if(mainMode === 'challenge') {
        if(challengeLevel === 1) { subMode = 'num'; isFlip = (level >= 5); }
        if(challengeLevel === 2) { subMode = 'mix'; isFlip = false; }
        if(challengeLevel === 3) { subMode = 'mix'; isFlip = true; }
    }

    const count = 3 + Math.floor(level / 3);
    const speed = Math.max(150, 1000 - (level * 60));
    
    document.getElementById('lv-ui').innerText = level;
    document.getElementById('sc-ui').innerText = score;
    document.getElementById('input-area').style.display = 'none';
    
    const display = document.getElementById('flash-text');
    if(isFlip) display.classList.add('flip'); else display.classList.remove('flip');

    for(let i=0; i<count; i++) {
        let n = Math.floor(Math.random() * 9) + 1;
        numbers.push(n);
        display.innerText = convert(n);
        await new Promise(r => setTimeout(r, speed));
        display.innerText = '';
        await new Promise(r => setTimeout(r, 100));
    }
    setupChoices();
}

function convert(n) {
    if(subMode==='kanji') return KANJI[n];
    if(subMode==='roman') return ROMAN[n];
    if(subMode==='mix') {
        let r = Math.random();
        return r < 0.33 ? KANJI[n] : (r < 0.66 ? ROMAN[n] : n);
    }
    return n;
}

function setupChoices() {
    document.getElementById('input-area').style.display = 'block';
    document.getElementById('timer-container').style.display = 'block';
    
    if(selectedType === 'anzan') {
        document.getElementById('answer-progress').innerText = "合計は？";
        let sum = numbers.reduce((a,b)=>a+b, 0);
        // 合計が2桁になっても4択で出せるよう制限なし（問題は1桁の集まり）
        createChoiceButtons(sum);
    } else {
        updateMemoryProgress();
        createChoiceButtons(numbers[answerIndex]);
    }
    // 記憶・暗算共通で20秒制限にリセット（各回答ごとではなくラウンド全体）
    startTimer(20000); 
}

function createChoiceButtons(correct) {
    const container = document.getElementById('choices-container');
    container.innerHTML = '';
    let choices = [correct];
    while(choices.length < 4) {
        // 記憶モードで答えが1桁であることを保証
        let fake = (selectedType === 'memory') 
            ? Math.floor(Math.random()*9)+1 
            : correct + (Math.floor(Math.random()*11) - 5);
        if(fake >= 0 && !choices.includes(fake)) choices.push(fake);
    }
    choices.sort(() => Math.random() - 0.5);

    choices.forEach(val => {
        const btn = document.createElement('button');
        btn.className = 'choice-btn';
        btn.innerText = val;
        btn.onclick = () => handleInput(val, correct);
        container.appendChild(btn);
    });
}

function handleInput(selected, correct) {
    if(selected !== correct) return gameOver("不正解！");

    if(selectedType === 'anzan') {
        success();
    } else {
        answerIndex++;
        if(answerIndex === numbers.length) {
            success();
        } else {
            updateMemoryProgress();
            // 記憶モードの次の数字（必ず1桁）を4択で出す
            createChoiceButtons(numbers[answerIndex]);
        }
    }
}

function startTimer(duration) {
    clearInterval(timerInterval);
    let start = Date.now();
    const bar = document.getElementById('timer-bar');
    timerInterval = setInterval(() => {
        let delta = Date.now() - start;
        timeLeft = 100 - (delta / duration * 100);
        bar.style.width = timeLeft + "%";
        if(timeLeft <= 0) gameOver("時間切れ！");
    }, 50);
}

function updateMemoryProgress() {
    document.getElementById('answer-progress').innerText = `順番に選択 (${answerIndex+1}/${numbers.length})`;
}

function success() {
    clearInterval(timerInterval);
    // スコア計算: 基本1000点 × レベル倍率
    let multiplier = 1;
    if(mainMode === 'challenge') {
        if(challengeLevel === 2) multiplier = 2;
        if(challengeLevel === 3) multiplier = 4;
    }
    score += (level * 1000) * multiplier;
    level++;
    
    const hi = localStorage.getItem('flash_hi') || 0;
    if(score > hi) localStorage.setItem('flash_hi', score);
    
    setTimeout(runRound, 600);
}

function gameOver(msg) {
    clearInterval(timerInterval);
    alert(msg + "\nScore: " + score);
    location.reload();
}

document.getElementById('hi-score').innerText = localStorage.getItem('flash_hi') || 0;
</script>
</body>
</html>
