<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>トップスコア ランキング</title>
    <style>
        body { font-family: 'Helvetica Neue', Arial, sans-serif; text-align: center; background: #f4f7f6; color: #333; margin: 0; padding: 20px; }
        .ranking-container { background: white; max-width: 500px; margin: 0 auto; padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        h1 { color: #2c3e50; font-size: 24px; margin-bottom: 20px; }
        .ranking-list { list-style: none; padding: 0; margin: 0; }
        .ranking-list li { display: flex; justify-content: space-between; padding: 12px 15px; border-bottom: 1px solid #eee; font-size: 18px; }
        .ranking-list li:nth-child(1) { background-color: #fff8e1; font-weight: bold; color: #f39c12; font-size: 22px; } /* 1位はゴールド */
        .ranking-list li:nth-child(2) { background-color: #f8f9fa; font-weight: bold; color: #7f8c8d; font-size: 20px; } /* 2位はシルバー */
        .ranking-list li:nth-child(3) { background-color: #fdf2e9; font-weight: bold; color: #d35400; font-size: 19px; } /* 3位はブロンズ */
        .rank-num { width: 30px; text-align: left; }
        .rank-name { flex-grow: 1; text-align: left; padding-left: 10px; }
        .rank-score { font-weight: bold; color: #27ae60; }
        .back-btn { display: inline-block; margin-top: 25px; padding: 12px 30px; background: #3498db; color: white; text-decoration: none; border-radius: 8px; font-weight: bold; transition: 0.3s; }
        .back-btn:hover { background: #2980b9; }
        .empty-msg { color: #7f8c8d; padding: 20px; }
    </style>
</head>
<body>

<div class="ranking-container">
    <h1>🏆 トップスコア ランキング 🏆</h1>
    
    <!-- ランキングデータがない場合 -->
    <div th:if="${ranking == null or ranking.empty}" class="empty-msg">
        まだスコアがありません。最初の記録を作りましょう！
    </div>

    <!-- ランキングデータがある場合 -->
    <ul th:if="${ranking != null and !ranking.empty}" class="ranking-list">
        <!-- Controllerから渡された ranking をループして表示 -->
        <li th:each="record, stat : ${ranking}">
            <span class="rank-num" th:text="${stat.count}">1</span>
            <span class="rank-name" th:text="${record.username}">プレイヤー名</span>
            <span class="rank-score"><span th:text="${record.score}">0</span> 点</span>
        </li>
    </ul>

    <a href="/" class="back-btn">ゲームに戻る</a>
</div>

</body>
</html>
