<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>フラッシュ・トレーニング・プロ 完全版</title>
    <link rel="icon" href="data:,">
    <style>
        body { font-family: 'Helvetica Neue', Arial, sans-serif; text-align: center; background: #f4f7f6; color: #333; margin: 0; padding: 10px; transition: background 0.2s; }
        
        /* ログイン・ユーザー情報エリアのスタイル */
        #user-info-area { max-width: 500px; margin: 0 auto 10px; text-align: right; font-size: 14px; }
        .auth-form { display: inline-block; margin-left: 10px; }
        .auth-input { padding: 4px; border: 1px solid #ccc; border-radius: 4px; width: 100px;}
        .auth-btn { padding: 4px 8px; background: #2c3e50; color: white; border: none; border-radius: 4px; cursor: pointer; }
        .auth-btn:hover { background: #34495e; }

        #game-container { background: white; max-width: 500px; margin: 10px auto; padding: 20px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); min-height: 520px; position: relative; overflow: hidden; }
        .mode-btn { display: block; width: 100%; max-width: 280px; margin: 12px auto; padding: 15px; background: #3498db; color: white; border: none; border-radius: 8px; font-size: 18px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .mode-btn:hover { background: #2980b9; transform: translateY(-2px); }
        .back-btn { background: #95a5a6; }
        #flash-wrapper { height: 160px; display: flex; align-items: center; justify-content: center; margin: 10px 0; position: relative; }
        #flash-text { font-size: 100px; font-weight: bold; width: 140px; height: 140px; display: flex; align-items: center; justify-content: center; }
        .underline { text-decoration: underline; text-underline-offset: 8px; text-decoration-thickness: 6px; }
        .effect-none { transform: rotate(0deg) scaleX(1); }
        .effect-flip { transform: scaleX(-1); }
        .effect-rotate90 { transform: rotate(90deg); }
        .effect-rotate-90 { transform: rotate(-90deg); }
        .choice-btn { font-size: 22px; padding: 15px; width: 45%; margin: 5px; cursor: pointer; border: 2px solid #3498db; background: white; border-radius: 10px; transition: 0.2s; box-sizing: border-box; }
        .choice-btn:active { transform: scale(0.95); background: #3498db; color: white; }
        #timer-container { width: 100%; height: 10px; background: #eee; border-radius: 5px; margin: 15px 0; overflow: hidden; display: none; }
        #timer-bar { width: 100%; height: 100%; background: #e74c3c; }
        #answer-progress { font-size: 18px; color: #2980b9; font-weight: bold; height: 24px; }
        .retire-link { display: block; text-align: right; font-size: 13px; color: #e74c3c; text-decoration: none; margin-bottom: 10px; cursor: pointer; }
        @keyframes correct-flash { 0% { background-color: #ffffff; } 50% { background-color: #d4edda; } 100% { background-color: #ffffff; } }
        .flash-success { animation: correct-flash 0.4s ease-out; }
        #feedback-text { position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%); font-size: 60px; font-weight: bold; color: #2ecc71; pointer-events: none; opacity: 0; z-index: 10; }
        @keyframes pop-up { 0% { opacity: 0; transform: translate(-50%, -30%) scale(0.5); } 50% { opacity: 1; transform: translate(-50%, -50%) scale(1.2); } 100% { opacity: 0; transform: translate(-50%, -70%) scale(1); } }
        .show-feedback { animation: pop-up 0.6s forwards; }
    </style>
</head>
<body>

<!-- ユーザー情報・ログインエリア -->
<div id="user-info-area">
	
	<div th:if="${errorMessage}" style="color: #721c24; background-color: #f8d7da; border: 1px solid #f5c6cb; padding: 10px; margin-bottom: 10px; border-radius: 5px; text-align: left; font-size: 14px;">
	        <span th:text="${errorMessage}"></span>
	    </div>
	
    <!-- ゲスト（未ログイン）の場合 -->
    <div th:if="${loggedInUser == null}">
        <span style="color: #e74c3c; font-weight: bold; margin-right: 10px;">[ゲストプレイ中]</span>
		<form action="/user-login" method="post" class="auth-form"> <!-- ←★ここを「/user-login」に変更 -->
		   <input type="text" name="username" class="auth-input" placeholder="ユーザー名" required>
		   <input type="password" name="password" class="auth-input" placeholder="パスワード" required>
		   <button type="submit" class="auth-btn">ログイン</button>
		</form>
		
        <form action="/register" method="post" class="auth-form" id="register-form">
            <input type="hidden" name="username" id="reg-user">
            <input type="hidden" name="password" id="reg-pass">
            <button type="button" class="auth-btn" onclick="registerUser()">新規登録</button>
        </form>
    </div>
    
    <!-- ログインしている場合 -->
    <div th:if="${loggedInUser != null}">
        <span style="color: #27ae60; font-weight: bold;">ようこそ、<span th:text="${loggedInUser}"></span> さん！</span>
        <a href="/ranking" style="margin-left: 10px;">ランキングを見る</a> | 
        <a href="/logout">ログアウト</a>
    </div>
</div>

<div id="game-container">
    <div id="feedback-text">正解！</div>
    
    <!-- メニュー画面 -->
    <div id="menu-screen">
        <div id="step-0">
            <h1>フラッシュ・プロ</h1>
            <button class="mode-btn" onclick="setStep('step-0','step-1'); selectedType='anzan';">フラッシュ暗算</button>
            <button class="mode-btn" onclick="setStep('step-0','step-1'); selectedType='memory';" style="background:#9b59b6;">フラッシュ記憶</button>
            <p>Local Best Score: <span id="hi-score">0</span></p>
            <p th:if="${loggedInUser == null}" style="font-size: 12px; color: #7f8c8d;">※ランキングにスコアを保存するにはログインしてください</p>
        </div>
        <div id="step-1" style="display:none;">
            <h2 id="current-game-title">モード選択</h2>
            <button class="mode-btn" onclick="mainMode='normal'; setStep('step-1','step-normal-1')">通常モード</button>
            <button class="mode-btn" onclick="mainMode='challenge'; setStep('step-1','step-challenge')" style="background:#e67e22;">チャレンジモード</button>
            <button class="mode-btn back-btn" onclick="setStep('step-1','step-0')">← 戻る</button>
        </div>
        <div id="step-normal-1" style="display:none;">
            <h3>文字種を選択</h3>
            <button class="mode-btn" onclick="subMode='num'; setStep('step-normal-1','step-normal-level')">数字のみ</button>
            <button class="mode-btn" onclick="subMode='kanji'; setStep('step-normal-1','step-normal-level')">漢数字</button>
            <button class="mode-btn" onclick="subMode='roman'; setStep('step-normal-1','step-normal-level')">旧漢数字</button>
            <button class="mode-btn" onclick="subMode='mix'; setStep('step-normal-1','step-normal-level')">複合</button>
        </div>
        <div id="step-normal-level" style="display:none;">
            <h3>開始レベル</h3>
            <button class="mode-btn" onclick="level=1; setStep('step-normal-level','step-normal-2')">Lv.1</button>
            <button class="mode-btn" onclick="level=5; setStep('step-normal-level','step-normal-2')">Lv.5</button>
            <button class="mode-btn" onclick="level=10; setStep('step-normal-level','step-normal-2')">Lv.10</button>
            <button class="mode-btn" onclick="level=15; setStep('step-normal-level','step-normal-2')">Lv.15</button>
        </div>
        <div id="step-normal-2" style="display:none;">
            <h3>ギミック</h3>
            <button class="mode-btn" onclick="isFlip=true; startInit()">ギミックあり</button>
            <button class="mode-btn" onclick="isFlip=false; startInit()">なし</button>
        </div>
        <div id="step-challenge" style="display:none;">
            <h3>チャレンジ</h3>
            <button class="mode-btn" onclick="challengeLevel=1; startInit()">Lv.1 (数字/途中ギミック)</button>
            <button class="mode-btn" onclick="challengeLevel=2; startInit()">Lv.2 (全文字種/固定)</button>
            <button class="mode-btn" onclick="challengeLevel=3; startInit()">Lv.3 (全文字種/ギミック)</button>
            <button class="mode-btn back-btn" onclick="setStep('step-challenge','step-1')">戻る</button>
        </div>
    </div>

    <!-- ゲーム画面 -->
    <div id="game-screen" style="display:none;">
        <span class="retire-link" onclick="location.reload()">[ 終了 ]</span>
        <div style="display: flex; justify-content: space-between; font-weight: bold; font-size: 14px;">
            <span>Lv: <span id="lv-ui">1</span></span>
            <span style="color:#27ae60;">Score: <span id="sc-ui">0</span></span>
        </div>
        <div id="flash-wrapper">
            <div id="flash-text"></div>
        </div>
        <div id="input-area" style="display:none;">
            <div id="answer-progress"></div>
            <div id="timer-container"><div id="timer-bar"></div></div>
            <div id="choices-container"></div>
        </div>
    </div>
</div>

<script>
// --- 新規登録用スクリプト ---
function registerUser() {
    const u = prompt("新規登録するユーザー名を入力してください");
    if(!u || u.trim() === "") {
        alert("ユーザー名を正しく入力してください。");
        return;
    }
    
    const p = prompt("パスワードを4〜10文字で入力してください");
    if(!p || p.trim() === "") {
        alert("パスワードを入力してください。");
        return;
    }
    if(p.length < 4 || p.length > 10) {
        alert("パスワードは4文字以上、10文字以下にする必要があります。");
        return;
    }
    
    // 値をセット
	document.getElementById('reg-user').value = u;
	document.getElementById('reg-pass').value = p;
	document.getElementById('register-form').submit();
    
    console.log("送信するユーザー名:", u);
    console.log("送信先フォームID:", document.getElementById('register-form').id);
    
    // フォームを送信
    document.getElementById('register-form').submit();
}

// --- ゲームロジック変数 ---
let selectedType='', mainMode='', subMode='num', level=1, challengeLevel=0, score=0, isFlip=false;
let numbers=[], answerIndex=0, timerInterval, timeLeft, currentDuration=0;
const KANJI = ["〇", "一", "二", "三", "四", "五", "六", "七", "八", "九"];
const ROMAN = ["零", "壱", "弐", "参", "肆", "伍", "陸", "漆", "捌", "玖"];

function setStep(old, next) {
    document.getElementById(old).style.display = 'none';
    document.getElementById(next).style.display = 'block';
}

function startInit() {
    document.getElementById('menu-screen').style.display = 'none';
    document.getElementById('game-screen').style.display = 'block';
    score = 0; if(mainMode === 'challenge') level = 1;
    runRound();
}

async function runRound() {
    numbers = []; answerIndex = 0;
    if(mainMode === 'challenge') {
        if(challengeLevel === 1) { subMode = 'num'; isFlip = (level >= 5); }
        else if(challengeLevel === 2) { subMode = 'mix'; isFlip = false; }
        else if(challengeLevel === 3) { subMode = 'mix'; isFlip = true; }
    }
    const count = 3 + Math.floor(level / 3);
    const speed = Math.max(150, 500 - (level * 40));
    document.getElementById('lv-ui').innerText = level;
    document.getElementById('sc-ui').innerText = Math.floor(score);
    document.getElementById('input-area').style.display = 'none';
    const display = document.getElementById('flash-text');

    for(let i=0; i<count; i++) {
        let n = Math.floor(Math.random() * 9) + 1;
        numbers.push(n);
        const convertedText = convert(n);
        display.className = ""; 
        if(isFlip) {
            let r = Math.random();
            if(r < 0.25) display.className = "effect-none";
            else if(r < 0.5) display.className = "effect-flip";
            else if(r < 0.75) display.className = "effect-rotate90";
            else display.className = "effect-rotate-90";
            if (!isNaN(convertedText)) display.classList.add('underline');
        }
        display.innerText = convertedText;
        await new Promise(r => setTimeout(r, speed));
        display.innerText = '';
        display.className = ""; 
        await new Promise(r => setTimeout(r, 100));
    }
    setupChoices();
}

function convert(n) {
    if(subMode==='kanji') return KANJI[n];
    if(subMode==='roman') return ROMAN[n];
    if(subMode==='mix') {
        let r = Math.random();
        return r < 0.33 ? KANJI[n] : (r < 0.66 ? ROMAN[n] : n);
    }
    return n;
}

function setupChoices() {
    document.getElementById('input-area').style.display = 'block';
    document.getElementById('timer-container').style.display = 'block';
    if(selectedType === 'anzan') {
        currentDuration = 5000;
        document.getElementById('answer-progress').innerText = "合計は？";
        createChoiceButtons(numbers.reduce((a,b)=>a+b, 0));
    } else {
        currentDuration = 20000;
        updateMemoryProgress();
        createChoiceButtons(numbers[answerIndex]);
    }
    startTimer(currentDuration); 
}

function createChoiceButtons(correct) {
    const container = document.getElementById('choices-container');
    container.innerHTML = '';
    let choices = [correct];
    while(choices.length < 4) {
        let fake = (selectedType === 'memory') ? Math.floor(Math.random()*9)+1 : correct + (Math.floor(Math.random()*11) - 5);
        if(fake >= 0 && !choices.includes(fake)) choices.push(fake);
    }
    choices.sort(() => Math.random() - 0.5);
    choices.forEach(val => {
        const btn = document.createElement('button');
        btn.className = 'choice-btn';
        btn.innerText = val;
        btn.onclick = () => handleInput(val, correct);
        container.appendChild(btn);
    });
}

function handleInput(selected, correct) {
    if(selected !== correct) return gameOver("不正解！");
    if(selectedType === 'memory' && answerIndex < numbers.length - 1) {
        answerIndex++;
        updateMemoryProgress();
        createChoiceButtons(numbers[answerIndex]);
    } else {
        triggerSuccessEffect();
    }
}

function triggerSuccessEffect() {
    clearInterval(timerInterval);
    const container = document.getElementById('game-container');
    const feedback = document.getElementById('feedback-text');
    container.classList.add('flash-success');
    feedback.classList.add('show-feedback');
    let multiplier = (mainMode === 'challenge' && challengeLevel === 2) ? 2 : (mainMode === 'challenge' && challengeLevel === 3) ? 4 : 1;
    let base = (level * 1000) * multiplier;
    let speedBonus = (timeLeft / 100) * base;
    score += (base + speedBonus);
    document.getElementById('sc-ui').innerText = Math.floor(score);
    setTimeout(() => {
        container.classList.remove('flash-success');
        feedback.classList.remove('show-feedback');
        level++;
        const hi = localStorage.getItem('flash_hi') || 0;
        if(score > hi) localStorage.setItem('flash_hi', Math.floor(score));
        runRound();
    }, 600);
}

function startTimer(duration) {
    clearInterval(timerInterval);
    let start = Date.now();
    const bar = document.getElementById('timer-bar');
    timerInterval = setInterval(() => {
        let delta = Date.now() - start;
        timeLeft = 100 - (delta / duration * 100);
        bar.style.width = Math.max(0, timeLeft) + "%";
        if(timeLeft <= 0) gameOver("時間切れ！");
    }, 50);
}

function updateMemoryProgress() {
    document.getElementById('answer-progress').innerText = `順番に選択 (${answerIndex+1}/${numbers.length})`;
}

// --- ゲームオーバー処理 (DB保存対応) ---
function gameOver(msg) {
    clearInterval(timerInterval);
    document.body.style.backgroundColor = "#f8d7da";
    
    const finalScore = Math.floor(score);
    
    // サーバーにスコア保存リクエストを送信
    fetch(`/api/saveScore?score=${finalScore}`, {
        method: 'POST'
    })
    .then(response => response.text())
    .then(result => {
        setTimeout(() => {
            if (result === 'success') {
                alert(msg + "\nFinal Score: " + finalScore + "\nスコアをランキングに保存しました！");
                window.location.href = "/ranking"; // ログイン済みならランキング画面へ
            } else {
                alert(msg + "\nFinal Score: " + finalScore + "\n（ゲストプレイのためスコアは保存されません）");
                location.reload(); // ゲストならトップに戻る
            }
        }, 100);
    })
    .catch(error => {
        // サーバー通信エラー時
        alert(msg + "\nFinal Score: " + finalScore);
        location.reload();
    });
}

// ローカルハイスコアの表示
document.getElementById('hi-score').innerText = Math.floor(localStorage.getItem('flash_hi') || 0);
</script>
</body>
</html>
